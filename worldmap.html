<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
        }
        #map {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;

    width: 600px;
    height: 400px;

    border: 2px solid #000;
    border-radius: 10px;
    overflow: hidden;
    z-index: 1000;
}

        #distance{
            position:absolute;
            top:15px;
            left:15px;
            z-index:1000;
            background:white;
            padding:10px 15px;
            border-radius:8px;
            font-weight:bold;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }
        #mapContainer{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:1000;
}

#toggle{
    padding:10px 18px;
    font-size:16px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,0.25);
}
    </style>
</head>
<body>

<div id="distance">
</div>

<div id="map"></div>
<div id="mapContainer">
    <button id="toggle">Open Map</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
<script src="map.js"></script>

</body>
</html>
